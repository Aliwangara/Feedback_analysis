{% load static %}
<!DOCTYPE html>
<html>
<head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2 class="text-center">Submit Your Feedback</h2>

        {{ form.as_p }}
        <button type="submit">Submit</button>
    </form>
</body>
</html>
